version: '3'

tasks:
  go:mod:tidy:
    summary: Runs `go mod tidy`
    internal: true
    cmds:
      - go mod tidy

  install:frontend:deps:
    summary: Install frontend dependencies
    cmds:
      - task: install:frontend:deps:{{.PACKAGE_MANAGER}}

  install:frontend:deps:npm:
    dir: frontend
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules
    preconditions:
      - sh: npm version
        msg: "Looks like npm isn't installed. Npm is part of the Node installer: https://nodejs.org/en/download/"
    cmds:
      # node_modules 已与 package.json 同步时绝不再跑 npm install。否则 darwin:package
      # 走 task 管线时这次重装会和并行的 generate:bindings 文件遍历同时动 node_modules，
      # npm 半路增删文件 → 遍历 open 到刚消失的文件 → `no such file or directory` 直接挂
      # （报错文件每次都不一样正是这个竞态的特征）。npm 装完会写 node_modules/.package-lock.json
      # 作同步标记；只要它在、package.json 没更新过它、且原生 binding 在，就跳过本次安装。
      # 改了 package.json（mtime 变新）会让条件失败 → 正常重装，本地开发体验不受影响。
      - |
        # 纯 shell builtin 检测，绝不调用 grep（Windows 下 task 用内置 mvdan/sh 解释器跑，
        # grep/rm 这类外部命令不在 PATH 里会 127 直接挂）。glob + case 排除 wasm binding。
        has_native_binding() {
          for d in node_modules/@rolldown/binding-*; do
            [ -e "$d" ] || continue
            case "$d" in *wasm*) continue ;; esac
            return 0
          done
          return 1
        }
        if [ -f node_modules/.package-lock.json ] \
           && [ ! package.json -nt node_modules/.package-lock.json ] \
           && has_native_binding; then
          echo "frontend deps in sync, skip npm install (avoids node_modules race in task pipeline)"
          exit 0
        fi
        npm install
        # npm/cli#4828 守卫：装完仍没有非 wasm 的原生 binding（漏装）→ 清干净按本机平台重装。
        # 用 node 删目录 + npm 清缓存，避免依赖 Windows 不带的 rm。
        if ! has_native_binding; then
          echo "native rolldown binding missing, clean reinstall (npm/cli#4828)"
          node -e "const fs=require('fs');fs.rmSync('node_modules',{recursive:true,force:true});fs.rmSync('package-lock.json',{force:true})"
          npm cache clean --force
          npm install --no-audit --no-fund
        fi

  install:frontend:deps:bun:
    dir: frontend
    sources:
      - package.json
      - bun.lock
      - bun.lockb
    generates:
      - node_modules
    preconditions:
      - sh: bun --version
        msg: "bun not found"
    cmds:
      - bun install

  install:frontend:deps:pnpm:
    dir: frontend
    sources:
      - package.json
      - pnpm-lock.yaml
    generates:
      - node_modules
    preconditions:
      - sh: pnpm --version
        msg: "pnpm not found"
    cmds:
      - pnpm install

  install:frontend:deps:yarn:
    dir: frontend
    sources:
      - package.json
      - yarn.lock
    status:
      - test -d node_modules || test -f .pnp.cjs
    preconditions:
      - sh: yarn --version
        msg: "yarn not found"
    cmds:
      - yarn install

  build:frontend:
    label: build:frontend (DEV={{.DEV}} RUNNER={{.PACKAGE_MANAGER}})
    summary: Build the frontend project
    dir: frontend
    # 只指纹真实源文件，绝不遍历 node_modules：task 的 exclude 是枚举后再过滤，
    # `**/*` 仍会下钻 node_modules，遇到不可读/半装好的条目（如 CI 上的
    # @napi-rs/wasm-runtime、或 .bindings-tmp-* 0700 临时目录）就会报
    # `open ...: no such file or directory` 直接挂掉。
    sources:
      - "src/**/*"
      - "public/**/*"
      - "bindings/**/*"
      - index.html
      - vite.config.ts
      - tsconfig.json
      - package.json
      - package-lock.json
    generates:
      - dist/**/*
    deps:
      - task: install:frontend:deps
      - task: generate:bindings
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
          OBFUSCATED:
            ref: .OBFUSCATED
    cmds:
      - task: frontend:run
        vars:
          SCRIPT: '{{if eq .DEV "true"}}build:dev{{else}}build{{end}}'
    env:
      PRODUCTION: '{{if eq .DEV "true"}}false{{else}}true{{end}}'

  frontend:run:
    summary: Run a frontend script with selected runner
    cmds:
      - task: frontend:run:{{.PACKAGE_MANAGER}}
        vars:
          SCRIPT: "{{.SCRIPT}}"
    vars:
      SCRIPT: "{{.SCRIPT}}"

  frontend:run:npm:
    dir: frontend
    cmds:
      - npm run {{.SCRIPT}} -q
    vars:
      SCRIPT: "{{.SCRIPT}}"

  frontend:run:yarn:
    dir: frontend
    cmds:
      - yarn {{.SCRIPT}}
    vars:
      SCRIPT: "{{.SCRIPT}}"

  frontend:run:pnpm:
    dir: frontend
    cmds:
      - pnpm run {{.SCRIPT}}
    vars:
      SCRIPT: "{{.SCRIPT}}"

  frontend:run:bun:
    dir: frontend
    cmds:
      - bun run {{.SCRIPT}}
    vars:
      SCRIPT: "{{.SCRIPT}}"

  frontend:vendor:puppertino:
    summary: Fetches Puppertino CSS into frontend/public for consistent mobile styling
    sources:
      - frontend/public/puppertino/puppertino.css
    generates:
      - frontend/public/puppertino/puppertino.css
    cmds:
      - |
        set -euo pipefail
        mkdir -p frontend/public/puppertino
        # If bundled Puppertino exists, prefer it. Otherwise, try to fetch, but don't fail build on error.
        if [ ! -f frontend/public/puppertino/puppertino.css ]; then
          echo "No bundled Puppertino found. Attempting to fetch from GitHub..."
          if curl -fsSL https://raw.githubusercontent.com/codedgar/Puppertino/main/dist/css/full.css -o frontend/public/puppertino/puppertino.css; then
            curl -fsSL https://raw.githubusercontent.com/codedgar/Puppertino/main/LICENSE -o frontend/public/puppertino/LICENSE || true
            echo "Puppertino CSS downloaded to frontend/public/puppertino/puppertino.css"
          else
            echo "Warning: Could not fetch Puppertino CSS. Proceeding without download since template may bundle it."
          fi
        else
          echo "Using bundled Puppertino at frontend/public/puppertino/puppertino.css"
        fi
        # Ensure index.html includes Puppertino CSS and button classes
        INDEX_HTML=frontend/index.html
        if [ -f "$INDEX_HTML" ]; then
          if ! grep -q 'href="/puppertino/puppertino.css"' "$INDEX_HTML"; then
            # Insert Puppertino link tag after style.css link
            awk '
              /href="\/style.css"\/?/ && !x { print; print "    <link rel=\"stylesheet\" href=\"/puppertino/puppertino.css\"/>"; x=1; next }1
            ' "$INDEX_HTML" > "$INDEX_HTML.tmp" && mv "$INDEX_HTML.tmp" "$INDEX_HTML"
          fi
          # Replace default .btn with Puppertino primary button classes if present
          sed -E -i'' 's/class=\"btn\"/class=\"p-btn p-prim-col\"/g' "$INDEX_HTML" || true
        fi



  generate:bindings:
    label: generate:bindings (BUILD_FLAGS={{.BUILD_FLAGS}})
    summary: Generates bindings for the frontend
    deps:
      - task: go:mod:tidy
    sources:
      - "**/*.[jt]s"
      - exclude: frontend/**/*
      - frontend/bindings/**/*  # Rerun when switching between dev/production mode causes changes in output
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - frontend/bindings/**/*
    cmds:
      - wails3 generate bindings -f '{{.BUILD_FLAGS}}' -clean=true{{if eq .OBFUSCATED "true"}} -obfuscated{{end}} -ts -names

  generate:icons:
    summary: Generates Windows `.ico` and Mac `.icns` from `appicon.png`. We intentionally do NOT generate an `Assets.car` (Icon Composer) bundle — its source `.icon` would override `icons.icns` via `CFBundleIconName` and CI runners (full Xcode) would compile a stale/default icon while local dev (no actool) silently falls back. Keeping a single `icons.icns` source keeps dev and CI identical.
    dir: build
    sources:
      - "appicon.png"
    generates:
      - "darwin/icons.icns"
      - "windows/icon.ico"
    cmds:
      - wails3 generate icons -input appicon.png -macfilename darwin/icons.icns -windowsfilename windows/icon.ico

  dev:frontend:
    summary: Runs the frontend in development mode
    deps:
      - task: install:frontend:deps
    cmds:
      - task: frontend:dev:{{.PACKAGE_MANAGER}}

  frontend:dev:npm:
    dir: frontend
    cmds:
      - npm run dev -- --port {{.VITE_PORT}} --strictPort

  frontend:dev:yarn:
    dir: frontend
    cmds:
      - yarn dev --port {{.VITE_PORT}} --strictPort

  frontend:dev:pnpm:
    dir: frontend
    cmds:
      - pnpm dev --port {{.VITE_PORT}} --strictPort

  frontend:dev:bun:
    dir: frontend
    cmds:
      - bun run dev --port {{.VITE_PORT}} --strictPort

  update:build-assets:
    summary: Updates the build assets
    dir: build
    cmds:
      - wails3 update build-assets -name "{{.APP_NAME}}" -binaryname "{{.APP_NAME}}" -config config.yml -dir .

  build:server:
    summary: Builds the application in server mode (no GUI, HTTP server only)
    desc: |
      Builds the application with the server build tag enabled.
      Server mode runs as a pure HTTP server without native GUI dependencies.
      Usage: task build:server
    deps:
      - task: build:frontend
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
    cmds:
      - go build -tags server {{.BUILD_FLAGS}} -o {{.BIN_DIR}}/{{.APP_NAME}}-server{{exeExt}}
    vars:
      BUILD_FLAGS: "{{.BUILD_FLAGS}}"

  run:server:
    summary: Builds and runs the application in server mode
    deps:
      - task: build:server
    cmds:
      - ./{{.BIN_DIR}}/{{.APP_NAME}}-server{{exeExt}}

  build:docker:
    summary: Builds a Docker image for server mode deployment
    desc: |
      Creates a minimal Docker image containing the server mode binary.
      The image is based on distroless for security and small size.
      Usage: task build:docker [TAG=myapp:latest]
    cmds:
      - docker build -t {{.TAG | default (printf "%s:latest" .APP_NAME)}} -f build/docker/Dockerfile.server .
    vars:
      TAG: "{{.TAG}}"
    preconditions:
      - sh: docker info > /dev/null 2>&1
        msg: "Docker is required. Please install Docker first."
      - sh: test -f build/docker/Dockerfile.server
        msg: "Dockerfile.server not found. Run 'wails3 update build-assets' to generate it."

  run:docker:
    summary: Builds and runs the Docker image
    desc: |
      Builds the Docker image and runs it, exposing port 8080.
      Usage: task run:docker [TAG=myapp:latest] [PORT=8080]
      Note: The internal container port is always 8080. The PORT variable
      only changes the host port mapping. Ensure your app uses port 8080
      or modify the Dockerfile to match your ServerOptions.Port setting.
    deps:
      - task: build:docker
        vars:
          TAG:
            ref: .TAG
    cmds:
      - docker run --rm -p {{.PORT | default "8080"}}:8080 {{.TAG | default (printf "%s:latest" .APP_NAME)}}
    vars:
      TAG: "{{.TAG}}"
      PORT: "{{.PORT}}"

  setup:docker:
    summary: Builds Docker image for cross-compilation (~800MB download)
    desc: |
      Builds the Docker image needed for cross-compiling to any platform.
      Run this once to enable cross-platform builds from any OS.
    cmds:
      - docker build -t wails-cross -f build/docker/Dockerfile.cross build/docker/
    preconditions:
      - sh: docker info > /dev/null 2>&1
        msg: "Docker is required. Please install Docker first."

