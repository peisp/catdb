name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # 不开 npm 缓存：恢复回来的 ~/.npm 会触发 npm 可选依赖 bug
          # (npm/cli#4828)，把当前平台的 rolldown/lightningcss 原生 binding 标记为
          # skipped，导致回退到半装好的 wasm-runtime 子树而构建崩溃。

      - name: Install build tools
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.106
          go install github.com/go-task/task/v3/cmd/task@latest
          # Add GOBIN to PATH for subsequent steps
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Inject version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Version: $VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VITE_APP_VERSION=$VERSION" >> "$GITHUB_ENV"

          # Update config.yml with the tag version (macOS sed needs -i '')
          sed -i '' "s/version: \".*\"/version: \"$VERSION\"/" build/config.yml

          # Regenerate Info.plist / info.json from updated config
          (cd build && wails3 update build-assets \
            -name catdb -binaryname catdb -config config.yml -dir .)

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci
          # npm/cli#4828 守卫：npm 偶发漏装当前平台的 rolldown 原生 binding，留下
          # 半装好的 node_modules（悬空的 @emnapi/* wasm-runtime 文件），让 Task 的
          # 文件指纹或 vite 报 `open ...: no such file or directory` 直接挂掉。
          # 只要没有任何非 wasm 的原生 binding，就从干净状态（清掉 lockfile + npm 缓存）
          # 重装，强制按本机平台重新解析。
          if ! ls node_modules/@rolldown/binding-* 2>/dev/null | grep -qv wasm; then
            echo "::warning::native rolldown binding missing, clean reinstall (npm/cli#4828)"
            rm -rf node_modules package-lock.json ~/.npm/_cacache
            npm install --no-audit --no-fund
          fi

      - name: Build and package .app bundle
        run: task darwin:package ARCH=${{ matrix.arch }}

      - name: Build DMG installer
        run: |
          # UDZO = compressed read-only; /Applications symlink so users can
          # drag the .app over. Uses macOS-builtin hdiutil — no extra deps.
          STAGE=$(mktemp -d)
          cp -R bin/catdb.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create \
            -volname "catdb" \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            "catdb-${VERSION}-darwin-${{ matrix.arch }}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: catdb-darwin-${{ matrix.arch }}
          path: catdb-${{ env.VERSION }}-darwin-${{ matrix.arch }}.dmg
          if-no-files-found: error

  # ── Windows ────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (${{ matrix.arch }})
    strategy:
      matrix:
        arch: [amd64]
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # 不开 npm 缓存：恢复回来的 ~/.npm 会触发 npm 可选依赖 bug
          # (npm/cli#4828)，把当前平台的 rolldown/lightningcss 原生 binding 标记为
          # skipped，导致回退到半装好的 wasm-runtime 子树而构建崩溃。

      - name: Install Go build tools
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.106
          go install github.com/go-task/task/v3/cmd/task@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Inject version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Version: $VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VITE_APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/version: \".*\"/version: \"$VERSION\"/" build/config.yml
          (cd build && wails3 update build-assets \
            -name catdb -binaryname catdb -config config.yml -dir .)

      - name: Install NSIS
        run: |
          choco install nsis -y --no-progress
          echo "C:/Program Files (x86)/NSIS" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci
          # npm/cli#4828 守卫：npm 偶发漏装当前平台的 rolldown 原生 binding，留下
          # 半装好的 node_modules（悬空的 @emnapi/* wasm-runtime 文件），让 Task 的
          # 文件指纹或 vite 报 `open ...: no such file or directory` 直接挂掉。
          # 只要没有任何非 wasm 的原生 binding，就从干净状态（清掉 lockfile + npm 缓存）
          # 重装，强制按本机平台重新解析。
          if ! ls node_modules/@rolldown/binding-* 2>/dev/null | grep -qv wasm; then
            echo "::warning::native rolldown binding missing, clean reinstall (npm/cli#4828)"
            rm -rf node_modules package-lock.json ~/.npm/_cacache
            npm install --no-audit --no-fund
          fi
      - name: Build frontend + generate bindings
        working-directory: frontend
        run: npm run build

      - name: Generate icons (icon.ico is gitignored)
        run: task common:generate:icons

      - name: Generate .syso (icon + manifest + version info)
        working-directory: build
        run: wails3 generate syso -arch amd64 -icon windows/icon.ico -manifest windows/wails.exe.manifest -info windows/info.json -out ../wails_windows_amd64.syso

      - name: Build Go binary
        run: |
          go build -tags production -trimpath -buildvcs=false \
            -ldflags="-w -s -H windowsgui" \
            -o bin/catdb.exe . 2>&1

      - name: Create NSIS installer
        run: |
          wails3 generate webview2bootstrapper -dir build/windows/nsis
          cd build/windows/nsis
          # cygpath -w converts Unix-style path to Windows backslash path for makensis
          BIN_PATH="$(cygpath -w "${{ github.workspace }}/bin/catdb.exe")"
          makensis -DARG_WAILS_AMD64_BINARY="$BIN_PATH" project.nsi 2>&1

      - name: Rename installer with version
        run: |
          # project.nsi outputs bin/catdb-<ARCH>-installer.exe; tag with version.
          mv "bin/catdb-${{ matrix.arch }}-installer.exe" \
             "bin/catdb-${VERSION}-windows-${{ matrix.arch }}-installer.exe"

      - name: List build outputs
        run: |
          echo "=== bin/ ==="
          ls -lh bin/

      - uses: actions/upload-artifact@v4
        with:
          name: catdb-windows-${{ matrix.arch }}
          path: bin/catdb-${{ env.VERSION }}-windows-${{ matrix.arch }}-installer.exe
          if-no-files-found: error

  # ── Release ────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for release notes

      - uses: actions/download-artifact@v4

      - name: Generate release notes from commit log
        run: |
          cat > release-notes.md << 'HEADER'
          ## Changelog

          HEADER

          # Get the previous tag (excluding current one)
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1 || true)

          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:"* %s (%h)" "${PREV_TAG}..HEAD" >> release-notes.md
          else
            git log --pretty=format:"* %s (%h)" >> release-notes.md
          fi

      - name: Collect release assets
        run: |
          mkdir -p assets
          cp catdb-darwin-*/*.dmg assets/ 2>/dev/null || true
          cp catdb-windows-*/*-installer.exe assets/ 2>/dev/null || true
          echo "=== Collected assets ==="
          ls -lh assets/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          ASSETS=(assets/*)
          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "ERROR: no assets found!" >&2
            exit 1
          fi
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release-notes.md \
            "${ASSETS[@]}"
